# \  ( OO )   ( OO ).-. ( OO ).                    ( OO ).  
#  ;-----.\   / . --. /(_)---\_)  ,-.-')   .-----.(_)---\_) 
#  | .-.  |   | \-.  \ /    _ |   |  |OO) '  .--.//    _ |  
#  | '-' /_).-'-'  |  |\  :` `.   |  |  \ |  |('-.\  :` `.  
#  | .-. `.  \| |_.'  | '..`''.)  |  |(_//_) |OO  )'..`''.) 
#  | |  \  |  |  .-.  |.-._)   \ ,|  |_.'||  |`-'|.-._)   \ 
#  | '--'  /  |  | |  |\       /(_|  |  (_'  '--'\\       / 
#  `------'   `--' `--' `-----'   `--'     `-----' `-----'
# TODO, more ways to configure:
# https://github.com/rothgar/awesome-tmux

# Improve colors
set -g default-terminal 'tmux-256color'

# Set scrollback buffer to 10000
set -g history-limit 10000

# Enable mouse support
set -g mouse on

# Customize the status line
set -g status-style 'fg=green,bg=black'

# Make tmux windows start at 1 instead of 0
set -g base-index 1

# Also make pane numbers start at 1
set -g pane-base-index 1

# set vim movement in select mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle \; send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Escape send-keys -X clear-selection

# prefix keys
unbind C-b
set-option -g prefix C-_ # Ctrl+/
bind-key C-_ send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %


#    _ (`-.                                                .-') _   .-')    
#   ( (OO  )                                              ( OO ) ) ( OO ).  
#  _.`     \ ,--.     ,--. ,--.     ,----.     ,-.-') ,--./ ,--,' (_)---\_) 
# (__...--'' |  |.-') |  | |  |    '  .-./-')  |  |OO)|   \ |  |\ /    _ |  
#  |  /  | | |  | OO )|  | | .-')  |  |_( O- ) |  |  \|    \|  | )\  :` `.  
#  |  |_.' | |  |`-' ||  |_|( OO ) |  | .--, \ |  |(_/|  .     |/  '..`''.) 
#  |  .___.'(|  '---.'|  | | `-' /(|  | '. (_/,|  |_.'|  |\    |  .-._)   \ 
#  |  |      |      |('  '-'(_.-'  |  '--'  |(_|  |   |  | \   |  \       / 
#  `--'      `------'  `-----'      `------'   `--'   `--'  `--'   `-----'
# tmux plugin manager
set -g @plugin 'tmux-plugins/tpm'

# theme
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_text " #W "
set -g @catppuccin_window_current_text " #W "

# https://github.com/tmux-plugins/tmux-sensible
# set of useful tmux options
# set -g @plugin 'tmux-plugins/tmux-sensible'

# resurrect
resurrect_dir="$HOME/.tmux/resurrect"
set -g @resurrect-dir $resurrect_dir
set -g @plugin 'tmux-plugins/tmux-resurrect'

# this is a hack from deepsie
# to get rid of a '%' sign im getting on top of every pane when restoring a tmux session
# one day i may think about it, but honestly configuring tmux is already taking way too long and i just
# mostly want my splits/panes with their locations be remembered
set -g @resurrect-hook-post-restore-all 'tmux list-panes -a -F "#{session_name}:#{window_index}.#{pane_index}" | xargs -I PANE tmux send-keys -t PANE C-l'

# NOPE, i gave up after 3+h trying to get nvim session restoration to work
# https://discourse.nixos.org/t/how-to-get-tmux-resurrect-to-restore-neovim-sessions/30819
# nothing worked, i had same problem as SamuelCano03 here:
# https://github.com/tmux-plugins/tmux-resurrect/issues/421
# set -g @resurrect-strategy-nvim 'session'

# for select mode yank to write into clipboard
set -g @plugin 'tmux-plugins/tmux-yank'

# this works together with resurrect to automatically save tmux environments
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-save-interval '1'
set -g @continuum-restore 'on'  # Auto-restore on tmux start

# Initialize TMUX plugin manager 
# 🔥 keep this line at the very bottom
# to source while tmux is running: tmux source ~/.tmux.conf
run '~/.tmux/plugins/tpm/tpm'
